name: 🕐 Управление подписками

on:
  schedule:
    # Запуск каждый день в 00:00 и 12:00 UTC (03:00 и 15:00 МСК)
    - cron: '0 0,12 * * *'
  workflow_dispatch:  # Можно запускать вручную

jobs:
  manage-subscriptions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 📥 Клонируем репозиторий
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🔧 Делаем скрипт исполняемым
        run: chmod +x scripts/check_subscriptions.sh
      
      - name: ⏰ Запускаем проверку подписок
        id: check
        run: |
          # Запускаем скрипт и сохраняем вывод
          ./scripts/check_subscriptions.sh > logs/last_run.log 2>&1
          
          # Извлекаем количество напоминаний и удалений
          reminded=$(grep "Напоминаний отправлено:" logs/last_run.log | grep -o '[0-9]\+' || echo "0")
          deleted=$(grep "Отключено сегодня:" logs/last_run.log | grep -o '[0-9]\+' || echo "0")
          
          echo "reminded=$reminded" >> $GITHUB_OUTPUT
          echo "deleted=$deleted" >> $GITHUB_OUTPUT
          
          # Показываем лог
          cat logs/last_run.log
      
      - name: 📱 Отправляем уведомления в Telegram (напоминания)
        if: steps.check.outputs.reminded > 0
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ⏰ **Напоминания об окончании подписки (2 дня)**
            
            Сегодня нужно напомнить **${{ steps.check.outputs.reminded }}** пользователям.
            
            Проверьте логи: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      
      - name: 📱 Отправляем уведомления в Telegram (отключения)
        if: steps.check.outputs.deleted > 0
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ **Автоматически отключены подписки**
            
            Сегодня истекло и отключено: **${{ steps.check.outputs.deleted }}** подписок.
            
            Файлы перемещены в users/expired/
      
      - name: 💾 Сохраняем изменения
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Добавляем все изменения
          git add users/ logs/
          
          # Проверяем, есть ли изменения для коммита
          if ! git diff --quiet && ! git diff --staged --quiet; then
            git commit -m "🕐 Автообновление подписок ($(date +%Y-%m-%d))"
            git push
            echo "📤 Изменения отправлены на GitHub"
          else
            echo "✨ Нет изменений для коммита"
          fi 
